<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自适应学习五子棋AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a5276 0%, #2ecc71 100%);
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .game-title {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 2px;
        }

        .main-content {
            display: flex;
            gap: 15px;
            flex-direction: row;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
        }

        .board-container {
            background: linear-gradient(145deg, #d4a574, #c4956a);
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: fit-content;
            max-width: 100%;
        }

        /* 使用table布局替代grid，兼容旧浏览器 */
        #board {
            display: block;
            background: #d4a574;
            border-collapse: collapse;
        }

        .board-row {
            display: block;
            height: var(--cell-size, 22px);
            white-space: nowrap;
            font-size: 0;
        }

        .cell {
            display: inline-block;
            width: var(--cell-size, 22px);
            height: var(--cell-size, 22px);
            position: relative;
            vertical-align: top;
            border-right: 1px solid #8b6914;
            border-bottom: 1px solid #8b6914;
            text-align: center;
            line-height: var(--cell-size, 22px);
        }

        .cell:last-child {
            border-right: none;
        }

        .board-row:last-child .cell {
            border-bottom: none;
        }

        .cell .piece {
            display: inline-block;
            width: calc(var(--cell-size, 22px) * 0.75);
            height: calc(var(--cell-size, 22px) * 0.75);
            border-radius: 50%;
            vertical-align: middle;
            position: relative;
            z-index: 10;
        }

        .cell .piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .cell .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .status-panel {
            margin-top: 12px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            width: 100%;
        }

        .status-panel .current-turn {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .control-panel {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .panel-section {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .panel-title {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            display: block;
            text-align: center;
            min-height: 44px;
            outline: none;
            position: relative;
            z-index: 100;
        }

        .btn-new { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-learn { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-train { background: linear-gradient(135deg, #e67e22, #d35400); }
        .btn-reset { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn.active { box-shadow: 0 0 12px rgba(255,255,255,0.5); border: 2px solid #fff; }

        .stat-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card:last-child { border-bottom: none; }
        .stat-label { color: rgba(255,255,255,0.8); font-size: 13px; }
        .stat-value { color: #fff; font-size: 18px; font-weight: bold; }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-top: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }
        .status-dot.active { background: #2ecc71; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .ai-status-text { color: #fff; font-size: 13px; }

        .learning-progress { margin-top: 8px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 3px; transition: width 0.5s; width: 0%;
        }
        .progress-label { color: rgba(255,255,255,0.8); font-size: 11px; margin-top: 4px; text-align: center; }

        .winner-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .winner-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px 25px;
            border-radius: 16px;
            text-align: center;
            color: #fff;
            animation: popIn 0.4s;
            width: 100%;
            max-width: 320px;
        }
        @keyframes popIn { 0%{transform:scale(0.6);opacity:0} 100%{transform:scale(1);opacity:1} }
        .winner-text { font-size: 26px; font-weight: bold; margin-bottom: 16px; }
        .winner-piece {
            width: 50px; height: 50px;
            border-radius: 50%;
            margin: 0 auto 16px;
        }
        .winner-piece.black { background: radial-gradient(circle at 30% 30%, #555, #000); }
        .winner-piece.white { background: radial-gradient(circle at 30% 30%, #fff, #ddd); }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .game-title { font-size: 18px; }
            .control-panel { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 8px; }
            .panel-section { flex: 1; min-width: 140px; }
            .btn { font-size: 14px; padding: 10px; }
        }

        @media (max-width: 380px) {
            .game-title { font-size: 16px; }
            .panel-section { min-width: 120px; padding: 10px; }
            .btn { font-size: 13px; padding: 9px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="game-title">自适应学习五子棋AI</h1>
        <div class="main-content">
            <div class="game-area">
                <div class="board-container">
                    <div id="board"></div>
                </div>
                <div class="status-panel">
                    <div class="current-turn" id="currentTurn">当前回合：黑棋（玩家）</div>
                    <div id="gameStatus">请点击棋盘落子</div>
                </div>
            </div>

            <div class="control-panel">
                <div class="panel-section">
                    <div class="panel-title">游戏控制</div>
                    <button class="btn btn-new" id="btnNew">新游戏</button>
                    <button class="btn btn-learn" id="learnBtn">启用学习模式</button>
                    <button class="btn btn-train" id="btnTrain">训练AI</button>
                    <button class="btn btn-reset" id="btnReset">重置AI知识</button>
                </div>

                <div class="panel-section">
                    <div class="panel-title">对战统计</div>
                    <div class="stat-card"><span class="stat-label">玩家胜利</span><span class="stat-value" id="playerWins">0</span></div>
                    <div class="stat-card"><span class="stat-label">AI胜利</span><span class="stat-value" id="aiWins">0</span></div>
                    <div class="stat-card"><span class="stat-label">平局</span><span class="stat-value" id="draws">0</span></div>
                    <div class="stat-card"><span class="stat-label">AI胜率</span><span class="stat-value" id="aiWinRate">0%</span></div>
                    <div class="stat-card"><span class="stat-label">总对局</span><span class="stat-value" id="totalGames">0</span></div>
                </div>

                <div class="panel-section">
                    <div class="panel-title">AI学习状态</div>
                    <div class="ai-status">
                        <div class="status-dot" id="statusDot"></div>
                        <span class="ai-status-text" id="aiStatusText">学习模式：关闭</span>
                    </div>
                    <div class="learning-progress">
                        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                        <div class="progress-label" id="progressLabel">学习进度：0%</div>
                    </div>
                    <div class="stat-card" style="margin-top:8px;"><span class="stat-label">已学习棋局</span><span class="stat-value" id="learnedGames">0</span></div>
                    <div class="stat-card"><span class="stat-label">策略库大小</span><span class="stat-value" id="strategySize">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="winner-modal" id="winnerModal">
        <div class="winner-content">
            <div class="winner-piece" id="winnerPiece"></div>
            <div class="winner-text" id="winnerText"></div>
            <button class="btn btn-new" id="btnModalNew" style="width:auto; padding:10px 24px; margin-top:4px;">再来一局</button>
        </div>
    </div>

    <script>
        var board = [];
        var currentPlayer = 'black';
        var gameOver = false;
        var learnMode = false;
        var aiKnowledge = { patterns: {}, gamesLearned: 0, strategies: 0 };
        var stats = { playerWins: 0, aiWins: 0, draws: 0, totalGames: 0 };
        var moveHistory = [];

        function setBoardSize() {
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            var isMobile = vw <= 768;

            var cellSize, boardWidth;

            if (isMobile) {
                boardWidth = vw - 36;
                cellSize = Math.floor(boardWidth / 15);
                var maxBoardHeight = vh * 0.5;
                if (cellSize * 15 > maxBoardHeight) {
                    cellSize = Math.floor(maxBoardHeight / 15);
                    boardWidth = cellSize * 15;
                }
            } else {
                var maxBoardWidth = Math.min(vw - 320, 560);
                cellSize = Math.floor(maxBoardWidth / 15);
                boardWidth = cellSize * 15;
            }

            document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
            document.documentElement.style.setProperty('--board-width', boardWidth + 'px');
            return cellSize;
        }

        function initBoard() {
            setBoardSize();
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board = [];

            for (var i = 0; i < 15; i++) {
                board[i] = [];
                var rowEl = document.createElement('div');
                rowEl.className = 'board-row';

                for (var j = 0; j < 15; j++) {
                    board[i][j] = null;
                    var cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    var placeholder = document.createElement('span');
                    placeholder.className = 'piece-placeholder';
                    placeholder.style.display = 'inline-block';
                    placeholder.style.width = '100%';
                    placeholder.style.height = '100%';
                    cell.appendChild(placeholder);
                    rowEl.appendChild(cell);
                }
                boardEl.appendChild(rowEl);
            }
        }

        function handleCellClick(row, col) {
            if (gameOver || board[row][col] || currentPlayer !== 'black') return;

            placePiece(row, col, 'black');
            moveHistory.push({row: row, col: col, player: 'black'});

            if (checkWin(row, col, 'black')) { endGame('black'); return; }
            if (isBoardFull()) { endGame('draw'); return; }

            currentPlayer = 'white';
            updateStatus();

            setTimeout(function() {
                if (!gameOver) aiMove();
            }, 400);
        }

        function placePiece(row, col, color) {
            board[row][col] = color;
            var cell = document.querySelector('[data-row="' + row + '"][data-col="' + col + '"]');
            if (!cell) return;
            var piece = document.createElement('span');
            piece.className = 'piece ' + color;
            cell.innerHTML = '';
            cell.appendChild(piece);
        }

        function aiMove() {
            if (gameOver) return;
            var move;

            if (learnMode && aiKnowledge.gamesLearned > 0) {
                move = getLearnedMove();
            }

            if (!move) {
                move = getBestMove();
            }

            if (!move) return;

            placePiece(move.row, move.col, 'white');
            moveHistory.push({row: move.row, col: move.col, player: 'white'});

            if (checkWin(move.row, move.col, 'white')) { endGame('white'); return; }
            if (isBoardFull()) { endGame('draw'); return; }

            currentPlayer = 'black';
            updateStatus();
        }

        function getBestMove() {
            var bestScore = -Infinity;
            var bestMoves = [];

            for (var i = 0; i < 15; i++) {
                for (var j = 0; j < 15; j++) {
                    if (!board[i][j]) {
                        var score = evaluatePosition(i, j, 'white') + evaluatePosition(i, j, 'black') * 0.9;
                        if (score > bestScore) {
                            bestScore = score;
                            bestMoves = [{row: i, col: j}];
                        } else if (score === bestScore) {
                            bestMoves.push({row: i, col: j});
                        }
                    }
                }
            }

            if (bestMoves.length === 0) return null;

            if (learnMode) {
                for (var k = 0; k < bestMoves.length; k++) {
                    var key = getPatternKey(bestMoves[k].row, bestMoves[k].col);
                    if (aiKnowledge.patterns[key]) {
                        bestMoves[k].score = (bestMoves[k].score || 0) + aiKnowledge.patterns[key] * 10;
                    }
                }
                bestMoves.sort(function(a, b) {
                    return (b.score || 0) - (a.score || 0);
                });
            }

            return bestMoves[Math.floor(Math.random() * Math.min(3, bestMoves.length))];
        }

        function evaluatePosition(row, col, color) {
            var score = 0;
            var directions = [[0,1], [1,0], [1,1], [1,-1]];

            for (var d = 0; d < directions.length; d++) {
                var dr = directions[d][0];
                var dc = directions[d][1];
                var count = 1, empty = 0, blocked = 0;

                for (var dir = 0; dir < 2; dir++) {
                    var direction = dir === 0 ? 1 : -1;
                    for (var i = 1; i < 5; i++) {
                        var r = row + dr * i * direction;
                        var c = col + dc * i * direction;
                        if (r < 0 || r >= 15 || c < 0 || c >= 15) {
                            blocked++;
                            break;
                        }
                        if (board[r][c] === color) {
                            count++;
                        } else if (!board[r][c]) {
                            empty++;
                            break;
                        } else {
                            blocked++;
                            break;
                        }
                    }
                }

                if (count >= 5) score += 100000;
                else if (count === 4 && blocked === 0) score += 10000;
                else if (count === 4 && blocked === 1) score += 1000;
                else if (count === 3 && blocked === 0) score += 1000;
                else if (count === 3 && blocked === 1) score += 100;
                else if (count === 2 && blocked === 0) score += 100;
                else score += count * 10;
            }

            var centerDist = Math.abs(row - 7) + Math.abs(col - 7);
            score += (14 - centerDist) * 5;
            return score;
        }

        function getPatternKey(row, col) {
            var key = '';
            for (var i = -2; i <= 2; i++) {
                for (var j = -2; j <= 2; j++) {
                    var r = row + i;
                    var c = col + j;
                    if (r >= 0 && r < 15 && c >= 0 && c < 15) {
                        key += board[r][c] ? board[r][c][0] : '0';
                    } else {
                        key += 'x';
                    }
                }
            }
            return key;
        }

        function getLearnedMove() {
            var bestScore = -Infinity;
            var bestMove = null;

            for (var i = 0; i < 15; i++) {
                for (var j = 0; j < 15; j++) {
                    if (!board[i][j]) {
                        var key = getPatternKey(i, j);
                        if (aiKnowledge.patterns[key] && aiKnowledge.patterns[key] > bestScore) {
                            bestScore = aiKnowledge.patterns[key];
                            bestMove = {row: i, col: j};
                        }
                    }
                }
            }

            return bestMove;
        }

        function checkWin(row, col, color) {
            var directions = [[0,1], [1,0], [1,1], [1,-1]];

            for (var d = 0; d < directions.length; d++) {
                var dr = directions[d][0];
                var dc = directions[d][1];
                var count = 1;

                for (var dir = 0; dir < 2; dir++) {
                    var direction = dir === 0 ? 1 : -1;
                    for (var i = 1; i < 5; i++) {
                        var r = row + dr * i * direction;
                        var c = col + dc * i * direction;
                        if (r >= 0 && r < 15 && c >= 0 && c < 15 && board[r][c] === color) {
                            count++;
                        } else {
                            break;
                        }
                    }
                }

                if (count >= 5) return true;
            }

            return false;
        }

        function isBoardFull() {
            for (var i = 0; i < 15; i++) {
                for (var j = 0; j < 15; j++) {
                    if (!board[i][j]) return false;
                }
            }
            return true;
        }

        function endGame(winner) {
            gameOver = true;
            stats.totalGames++;

            if (winner === 'black') {
                stats.playerWins++;
                document.getElementById('winnerText').textContent = '恭喜！你赢了！';
                document.getElementById('winnerPiece').className = 'winner-piece black';
                document.getElementById('winnerPiece').style.display = 'block';
                learnFromGame(false);
            } else if (winner === 'white') {
                stats.aiWins++;
                document.getElementById('winnerText').textContent = 'AI获胜！';
                document.getElementById('winnerPiece').className = 'winner-piece white';
                document.getElementById('winnerPiece').style.display = 'block';
                learnFromGame(true);
            } else {
                stats.draws++;
                document.getElementById('winnerText').textContent = '平局！';
                document.getElementById('winnerPiece').style.display = 'none';
            }

            updateStats();
            document.getElementById('winnerModal').style.display = 'flex';
            if (learnMode) updateLearningStatus();
        }

        function learnFromGame(aiWon) {
            if (!learnMode) return;
            aiKnowledge.gamesLearned++;

            for (var i = 0; i < moveHistory.length; i++) {
                var move = moveHistory[i];
                var key = getPatternKey(move.row, move.col);
                if (!aiKnowledge.patterns[key]) {
                    aiKnowledge.patterns[key] = 0;
                    aiKnowledge.strategies++;
                }

                if (aiWon && move.player === 'white') {
                    aiKnowledge.patterns[key] += 1;
                } else if (!aiWon && move.player === 'black') {
                    aiKnowledge.patterns[key] -= 0.5;
                }
            }
        }

        function updateStats() {
            document.getElementById('playerWins').textContent = stats.playerWins;
            document.getElementById('aiWins').textContent = stats.aiWins;
            document.getElementById('draws').textContent = stats.draws;
            document.getElementById('totalGames').textContent = stats.totalGames;

            var total = stats.playerWins + stats.aiWins;
            document.getElementById('aiWinRate').textContent = total > 0 ? Math.round((stats.aiWins / total) * 100) + '%' : '0%';
        }

        function updateStatus() {
            var turnText = currentPlayer === 'black' ? '黑棋（玩家）' : '白棋（AI）';
            document.getElementById('currentTurn').textContent = '当前回合：' + turnText;
            document.getElementById('gameStatus').textContent = currentPlayer === 'black' ? '请点击棋盘落子' : 'AI思考中...';
        }

        function updateLearningStatus() {
            document.getElementById('learnedGames').textContent = aiKnowledge.gamesLearned;
            document.getElementById('strategySize').textContent = aiKnowledge.strategies;
            var progress = Math.min(100, (aiKnowledge.gamesLearned / 50) * 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressLabel').textContent = '学习进度：' + Math.round(progress) + '%';
        }

        function newGame() {
            gameOver = false;
            currentPlayer = 'black';
            moveHistory = [];
            initBoard();
            updateStatus();
            document.getElementById('winnerModal').style.display = 'none';
        }

        function toggleLearnMode() {
            learnMode = !learnMode;
            var btn = document.getElementById('learnBtn');
            var dot = document.getElementById('statusDot');
            var text = document.getElementById('aiStatusText');

            if (learnMode) {
                btn.textContent = '关闭学习模式';
                btn.classList.add('active');
                dot.classList.add('active');
                text.textContent = '学习模式：开启';
            } else {
                btn.textContent = '启用学习模式';
                btn.classList.remove('active');
                dot.classList.remove('active');
                text.textContent = '学习模式：关闭';
            }
        }

        function trainAI() {
            if (gameOver) newGame();
            var originalLearnMode = learnMode;
            learnMode = true;
            var trainCount = 0;
            var maxTrain = 10;

            function autoPlay() {
                if (trainCount >= maxTrain) {
                    learnMode = originalLearnMode;
                    updateLearningStatus();
                    alert('AI训练完成！已模拟' + maxTrain + '局对战，策略库新增' + aiKnowledge.strategies + '条记录。');
                    return;
                }

                if (gameOver) {
                    trainCount++;
                    newGame();
                }

                if (currentPlayer === 'black') {
                    var moves = [];
                    for (var i = 0; i < 15; i++) {
                        for (var j = 0; j < 15; j++) {
                            if (!board[i][j]) moves.push({row: i, col: j});
                        }
                    }
                    if (moves.length > 0) {
                        var move = moves[Math.floor(Math.random() * moves.length)];
                        placePiece(move.row, move.col, 'black');
                        moveHistory.push({row: move.row, col: move.col, player: 'black'});
                        if (checkWin(move.row, move.col, 'black')) {
                            endGame('black');
                            setTimeout(autoPlay, 80);
                            return;
                        }
                        if (isBoardFull()) {
                            endGame('draw');
                            setTimeout(autoPlay, 80);
                            return;
                        }
                        currentPlayer = 'white';
                    }
                }

                if (currentPlayer === 'white' && !gameOver) {
                    var move = getBestMove();
                    if (move) {
                        placePiece(move.row, move.col, 'white');
                        moveHistory.push({row: move.row, col: move.col, player: 'white'});
                        if (checkWin(move.row, move.col, 'white')) {
                            endGame('white');
                            setTimeout(autoPlay, 80);
                            return;
                        }
                        if (isBoardFull()) {
                            endGame('draw');
                            setTimeout(autoPlay, 80);
                            return;
                        }
                        currentPlayer = 'black';
                    }
                }

                setTimeout(autoPlay, 40);
            }

            autoPlay();
        }

        function resetAI() {
            if (confirm('确定要重置AI的所有学习数据吗？')) {
                aiKnowledge = { patterns: {}, gamesLearned: 0, strategies: 0 };
                updateLearningStatus();
                alert('AI知识已重置！');
            }
        }

        function closeWinnerModal() {
            document.getElementById('winnerModal').style.display = 'none';
            newGame();
        }

        // 使用onclick属性绑定，兼容华为HTML查看器
        document.getElementById('btnNew').onclick = newGame;
        document.getElementById('learnBtn').onclick = toggleLearnMode;
        document.getElementById('btnTrain').onclick = trainAI;
        document.getElementById('btnReset').onclick = resetAI;
        document.getElementById('btnModalNew').onclick = closeWinnerModal;

        // 棋盘点击事件委托
        document.getElementById('board').onclick = function(e) {
            var cell = e.target;
            while (cell && cell !== this && !cell.classList.contains('cell')) {
                cell = cell.parentNode;
            }
            if (cell && cell.classList.contains('cell')) {
                var row = parseInt(cell.dataset.row);
                var col = parseInt(cell.dataset.col);
                handleCellClick(row, col);
            }
        };

        // 屏幕旋转或窗口大小变化
        window.onresize = setBoardSize;
        window.onorientationchange = function() {
            setTimeout(setBoardSize, 300);
        };

        // 初始化
        initBoard();
        updateStatus();
    </script>
</body>
</html>
